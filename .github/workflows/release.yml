name: Release

# Triggers when you push a tag like v1.0.0
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      # ── Build a release archive ────────────────────────────────────────────
      - name: Archive
        run: |
          xcodebuild archive \
            -project CursorLock.xcodeproj \
            -scheme CursorLock \
            -configuration Release \
            -archivePath build/CursorLock.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # ── Export the .app from the archive ──────────────────────────────────
      - name: Export app
        run: |
          xcodebuild -exportArchive \
            -archivePath build/CursorLock.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

      # ── Zip the .app for distribution ─────────────────────────────────────
      - name: Zip app
        run: |
          cd build/export
          zip -r ../../CursorLock-${{ github.ref_name }}.zip CursorLock.app

      # ── Create GitHub Release and attach the zip ───────────────────────────
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: CursorLock-${{ github.ref_name }}.zip
          generate_release_notes: true
